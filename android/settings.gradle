pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(settingsDir, "local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk")
        if (path == null) {
            path = System.getenv("FLUTTER_ROOT")
        }
        // Fallback for CI environments
        if (path == null) {
            path = "/opt/hostedtoolcache/flutter/stable-3.19.0-x64/flutter"
        }
        if (path == null) {
            throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties or set FLUTTER_ROOT environment variable.")
        }
        return path
    }
    def sdkPath = flutterSdkPath()
    includeBuild "$sdkPath/packages/flutter_tools/gradle"

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ':app'
